<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Створи свій акаунт</title>
</head>
<body>

    <div>
        <span>01 ЕТАП</span>
    </div>

    <h1>СТВОРИ <br> СВІЙ АКАУНТ</h1>
    <p>Почни свій шлях до найкращої версії себе</p>

    <form>
        <div>
            <label for="username">НІКНЕЙМ</label>
            <span>👤</span>
            <input type="text" id="username" name="username" placeholder="Введи свій нікнейм" required>
        </div>

        <div>
            <label for="password">ПАРОЛЬ</label>
            <span>🔒</span>
            <input type="password" id="password" name="password" placeholder="Введи пароль" required>
            <button type="button" aria-label="Показати пароль">👁️</button>
        </div>

        <div>
            <label for="email">EMAIL</label>
            <span>✉️</span>
            <input type="email" id="email" name="email" placeholder="Введи свою пошту" required>
        </div>

        <button type="submit">
            ПРОДОВЖИТИ <span>→</span>
        </button>
    </form>

  

</body>
</html>
